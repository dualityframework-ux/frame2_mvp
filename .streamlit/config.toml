[theme]
base = "dark"
primaryColor = "#bd3039"
backgroundColor = "#0d1117"
secondaryBackgroundColor = "#161b22"
textColor = "#e8eaed"
font = "sans serif"

[server]
headless = true
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 10

[browser]
gatherUsageStats = false

[runner]
magicEnabled = false
